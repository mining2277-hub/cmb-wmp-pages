<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>招行未过募集期人民币理财产品</title>
  <style>
    :root {
      --ink: #16202a;
      --muted: #607080;
      --line: #d9e1e8;
      --panel: #f7f9fb;
      --red: #a81732;
      --teal: #0b766d;
      --amber: #8a5a00;
      --blue: #245a9c;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: #eef2f5;
      letter-spacing: 0;
      overflow-x: hidden;
    }
    header {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 22px 24px 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.25;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      color: var(--muted);
      font-size: 13px;
    }
    main { padding: 18px 24px 28px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .metric {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px 14px;
    }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { margin-top: 6px; font-size: 22px; font-weight: 700; }
    .toolbar {
      display: grid;
      gap: 9px;
      margin: 12px 0;
    }
    .toolbar-primary {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(2, minmax(170px, 1fr)) minmax(240px, 1.45fr) auto;
      gap: 8px;
      align-items: center;
    }
    input[type="search"] {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      font-size: 14px;
      background: var(--white);
      color: var(--ink);
    }
    select, .reset-button {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
      background: var(--white);
      color: var(--ink);
    }
    select { cursor: pointer; }
    .reset-button {
      width: auto;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .reset-button:hover { border-color: #aebbc6; background: #f8fafb; }
    .toolbar-footer {
      display: flex;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
    }
    .segments {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: var(--white);
    }
    .segments button {
      height: 38px;
      border: 0;
      border-right: 1px solid var(--line);
      background: var(--white);
      color: var(--ink);
      padding: 0 14px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .segments button:last-child { border-right: 0; }
    .segments button.active { background: var(--red); color: var(--white); }
    .table-wrap {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      max-height: calc(100vh - 330px);
      scrollbar-gutter: stable;
    }
    .mobile-list { display: none; }
    .product-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }
    .product-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .product-card-title {
      min-width: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.45;
      word-break: break-word;
    }
    .product-card-tags {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 6px;
    }
    .risk-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      min-height: 24px;
      border: 1px solid #c8d3dc;
      border-radius: 4px;
      padding: 2px 6px;
      color: #354451;
      font-size: 12px;
      font-weight: 700;
    }
    .product-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }
    .mobile-key-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 14px;
      margin-top: 14px;
      padding-top: 13px;
      border-top: 1px solid var(--line);
    }
    .mobile-field { min-width: 0; }
    .mobile-field.full { grid-column: 1 / -1; }
    .mobile-label {
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }
    .mobile-value {
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }
    .mobile-details {
      margin-top: 12px;
      border-top: 1px solid var(--line);
    }
    .mobile-details summary {
      min-height: 44px;
      padding: 12px 0 8px;
      color: #354451;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .mobile-details-content { padding: 2px 0 5px; }
    .mobile-details-content .mobile-field + .mobile-field { margin-top: 10px; }
    .product-card-actions {
      display: flex;
      gap: 18px;
      margin-top: 13px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      font-size: 13px;
    }
    table {
      width: 100%;
      min-width: 1940px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 10px 11px;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.5;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: #f3f6f8;
      color: #354451;
      font-weight: 650;
      text-align: left;
    }
    td:last-child, th:last-child { border-right: 0; }
    tr:last-child td { border-bottom: 0; }
    .w-status { width: 94px; }
    .w-name { width: 210px; }
    .w-code { width: 105px; }
    .w-risk { width: 105px; }
    .w-highlight { width: 150px; }
    .w-date { width: 116px; }
    .w-term { width: 165px; }
    .w-benchmark { width: 190px; }
    .w-fee { width: 170px; }
    .w-range { width: 260px; }
    .w-history { width: 290px; }
    .w-link { width: 110px; }
    .sticky-status, .sticky-name {
      position: sticky;
      background: var(--white);
    }
    .sticky-status { left: 0; z-index: 3; }
    .sticky-name {
      left: 94px;
      z-index: 3;
      box-shadow: 7px 0 9px -9px rgba(22, 32, 42, 0.65);
    }
    thead .sticky-status, thead .sticky-name {
      z-index: 6;
      background: #f3f6f8;
    }
    tbody tr:hover td { background: #fafcfd; }
    tbody tr:hover .sticky-status, tbody tr:hover .sticky-name { background: #fafcfd; }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }
    .pill.future { background: #fff0d6; color: var(--amber); }
    .pill.active { background: #e5f5f3; color: var(--teal); }
    .muted { color: var(--muted); font-size: 12px; }
    .scroll-cell {
      max-height: 150px;
      overflow: auto;
      padding-right: 4px;
      word-break: break-word;
    }
    .history-item + .history-item {
      margin-top: 9px;
      padding-top: 8px;
      border-top: 1px solid #e6ebef;
    }
    .history-method {
      display: inline-block;
      margin-left: 4px;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 650;
    }
    .history-method.official { background: #e5f5f3; color: var(--teal); }
    .history-method.calculated { background: #e7effb; color: var(--blue); }
    .history-method.missing { background: #f1f3f5; color: var(--muted); }
    .history-status { color: var(--muted); font-size: 12px; margin-bottom: 7px; }
    .history-note { color: var(--muted); font-size: 12px; }
    .history-links { margin-left: 6px; white-space: nowrap; }
    a { color: var(--blue); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 6px;
      display: none;
    }
    @media (max-width: 860px) {

      h1 { font-size: 21px; }
      main { padding: 14px; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metric { padding: 10px 11px; }
      .metric .value { font-size: 20px; }
      .toolbar-primary { grid-template-columns: 1fr; }
      .filters { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filters .sort-control { grid-column: 1 / -1; }
      .reset-button { width: 100%; }
      .segments { width: 100%; }
      .segments button { flex: 1; padding: 0 8px; }
      .table-wrap { display: none !important; }
      .mobile-list { display: grid; gap: 10px; }
      .toolbar-footer { justify-content: flex-start; }
    }
    @media (min-width: 861px) and (max-width: 1280px) {
      .filters { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
    }
  </style>
</head>

    let statusFilter = "all";
    const search = document.getElementById("search");
    const rows = document.getElementById("rows");
    const empty = document.getElementById("empty");
    const tableWrap = document.getElementById("tableWrap");
    const mobileCards = document.getElementById("mobileCards");
    const managerFilter = document.getElementById("managerFilter");
    const riskFilter = document.getElementById("riskFilter");
    const sortFilter = document.getElementById("sortFilter");
    const resetFilters = document.getElementById("resetFilters");
    const resultCount = document.getElementById("resultCount");

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function populateSelect(select, values) {
      values.forEach(value => {
        if (!value) return;
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function termDays(row) {
      const text = String(row.productTerm || "");
      const match = text.match(/(\d+(?:\.\d+)?)\s*(个工作日|自然日|工作日|交易日|个月|月|年|天|日)/);
      if (!match) return null;
      const multipliers = { "个工作日": 1.4, "工作日": 1.4, "交易日": 1.4, "自然日": 1, "天": 1, "日": 1, "个月": 30, "月": 30, "年": 365 };
      return Number(match[1]) * (multipliers[match[2]] || 1);
    }

    function benchmarkFloor(row) {
      const text = String(row.benchmark || "").replace(/％/g, "%");
      const range = text.match(/(-?\d+(?:\.\d+)?)\s*%\s*(?:-|~|至|–|—)\s*(-?\d+(?:\.\d+)?)\s*%/);
      if (range) return Number(range[1]);
      const single = text.match(/^\s*(?:[A-Z]类份额[：:]\s*)?(-?\d+(?:\.\d+)?)\s*%\s*$/i);
      return single ? Number(single[1]) : null;
    }

    function compareNumbers(a, b, descending) {
      if (a === null && b === null) return 0;
      if (a === null) return 1;
      if (b === null) return -1;
      return descending ? b - a : a - b;
    }

    function sortRows(items) {
      const mode = sortFilter.value;
      if (mode === "default") return items;
      return items.sort((a, b) => {
        if (mode === "endAsc") return String(a.fundraisingEndDate).localeCompare(String(b.fundraisingEndDate));
        if (mode === "endDesc") return String(b.fundraisingEndDate).localeCompare(String(a.fundraisingEndDate));
        if (mode === "riskAsc") return compareNumbers(Number(String(a.risk).replace(/\D/g, "")) || null, Number(String(b.risk).replace(/\D/g, "")) || null, false);
        if (mode === "riskDesc") return compareNumbers(Number(String(a.risk).replace(/\D/g, "")) || null, Number(String(b.risk).replace(/\D/g, "")) || null, true);
        if (mode === "termAsc") return compareNumbers(termDays(a), termDays(b), false);
        if (mode === "termDesc") return compareNumbers(termDays(a), termDays(b), true);
        if (mode === "benchmarkAsc") return compareNumbers(benchmarkFloor(a), benchmarkFloor(b), false);
        if (mode === "benchmarkDesc") return compareNumbers(benchmarkFloor(a), benchmarkFloor(b), true);
        return 0;
      });
    }

    function matches(row) {
      if (statusFilter === "future" && !row.isFuture) return false;
      if (statusFilter === "endingToday" && !row.isEndingToday) return false;
      if (statusFilter === "active" && row.isFuture) return false;
      if (managerFilter.value && row.manager !== managerFilter.value) return false;
      if (riskFilter.value && row.risk !== riskFilter.value) return false;
      const query = search.value.trim().toLowerCase();
      if (!query) return true;
      return [
        row.productName,
        row.productCode,
        row.manager,
        row.risk,
        row.productTerm,
        row.productHighlights,
        row.benchmark,
        row.investmentRange,
        row.sameSeriesPerformance,
        row.sameSeriesHistoryStatus,
        (row.sameSeriesHistory || []).map(item => [item.productName, item.productCode, item.performance, item.note].join(" ")).join(" ")
      ].join(" ").toLowerCase().includes(query);
    }

    function renderHistory(row) {
      const history = Array.isArray(row.sameSeriesHistory) ? row.sameSeriesHistory : [];
      const status = row.sameSeriesHistoryStatus || row.sameSeriesPerformance || "未找到同系列历史产品";
      if (!history.length) return '<div class="history-status">' + escapeHtml(status) + '</div>';
      const statusHtml = '<div class="history-status">' + escapeHtml(status) + '</div>';
      return statusHtml + history.map(item => {
        const method = item.method || "缺失";
        const methodClass = method === "官方" ? "official" : method === "计算" ? "calculated" : "missing";
        const title = escapeHtml([item.productName, item.productDate].filter(Boolean).join(" "));
        const performance = escapeHtml(item.performance || "未能计算");
        const details = [
          item.source || "",
          item.sourceMode || "",
          item.interestStartDate ? "起息" + item.interestStartDate : "",
          item.investmentDays ? item.investmentDays + "天" : "",
          item.valueDate ? "截至" + item.valueDate : ""
        ].filter(Boolean).join(" · ");
        const note = item.note ? " · " + escapeHtml(item.note) : "";
        const netLink = item.netValueUrl ? '<a href="' + escapeHtml(item.netValueUrl) + '" target="_blank" rel="noreferrer">净值</a>' : "";
        const pdfLink = item.pdfUrl ? '<a href="' + escapeHtml(item.pdfUrl) + '" target="_blank" rel="noreferrer">说明书</a>' : "";
        const links = [netLink, pdfLink].filter(Boolean).join(" ");
        return '<div class="history-item"><div><strong>' + title + '</strong><span class="history-method ' + methodClass + '">' + escapeHtml(method) + '</span></div>' +
          '<div>' + performance + '</div>' +
          '<div class="history-note">' + escapeHtml(details) + note + (links ? '<span class="history-links">' + links + '</span>' : '') + '</div></div>';
      }).join("");
    }

    function compactTerm(value) {
      return String(value || "未找到").replace(/^(?:产品期限|最短持有期)[：:]\s*/, "");
    }

    function mobileField(label, value, full = false) {
      return '<div class="mobile-field' + (full ? ' full' : '') + '"><div class="mobile-label">' +
        escapeHtml(label) + '</div><div class="mobile-value">' + escapeHtml(value || "未找到") + '</div></div>';
    }

    function renderMobileCard(row) {
      const pdfLink = row.pdfUrl ? '<a href="' + escapeHtml(row.pdfUrl) + '" target="_blank" rel="noreferrer">产品说明书</a>' : '';
      const detailLink = row.detailUrl ? '<a href="' + escapeHtml(row.detailUrl) + '" target="_blank" rel="noreferrer">招行产品页</a>' : '';
      return '<article class="product-card">' +
        '<div class="product-card-head"><div class="product-card-title">' + escapeHtml(row.productName) + '</div>' +
        '<div class="product-card-tags"><span class="risk-badge">' + escapeHtml(row.risk || "-") + '</span>' +
        '<span class="pill ' + (row.isFuture ? 'future' : 'active') + '">' + escapeHtml(row.status) + '</span></div></div>' +
        '<div class="product-card-meta"><span>' + escapeHtml(row.manager) + '</span><span>' +
        escapeHtml(row.productCode) + '</span></div>' +
        '<div class="mobile-key-grid">' +
        mobileField('募集起始', row.fundraisingStartDate) +
        mobileField('募集结束', row.fundraisingEndDate) +
        mobileField('期限 / 最短持有期', compactTerm(row.productTerm)) +
        mobileField('业绩比较基准', row.benchmark) +
        mobileField('产品亮点', row.productHighlights, true) +
        '</div>' +
        '<details class="mobile-details"><summary>费用与投资范围</summary><div class="mobile-details-content">' +
        mobileField('投资管理费', row.investmentManagementFee, true) +
        mobileField('销售费', row.salesFee, true) +
        mobileField('投资范围', row.investmentRange, true) +
        '</div></details>' +
        '<details class="mobile-details"><summary>同系列历史业绩</summary><div class="mobile-details-content">' + renderHistory(row) + '</div></details>' +
        '<div class="product-card-actions">' + [detailLink, pdfLink].filter(Boolean).join('') + '</div>' +
        '</article>';
    }

    function render() {
      const visible = sortRows(PRODUCTS.filter(matches).slice());
      rows.innerHTML = visible.map(row => `
        <tr>
          <td class="sticky-status"><span class="pill ${row.isFuture ? "future" : "active"}">${escapeHtml(row.status)}</span></td>
          <td class="sticky-name">
            <div>${escapeHtml(row.productName)}</div>
            <div class="muted">${escapeHtml(row.manager)}</div>
          </td>
          <td><a href="${escapeHtml(row.detailUrl)}" target="_blank" rel="noreferrer">${escapeHtml(row.productCode)}</a></td>
          <td>${escapeHtml(row.risk)}</td>
          <td><div class="scroll-cell">${escapeHtml(row.productHighlights)}</div></td>
          <td>${escapeHtml(row.fundraisingStartDate)}</td>
          <td>${escapeHtml(row.fundraisingEndDate)}</td>
          <td><div class="scroll-cell">${escapeHtml(row.productTerm)}</div></td>
          <td><div class="scroll-cell">${escapeHtml(row.benchmark)}</div></td>
          <td><div class="scroll-cell">${escapeHtml(row.investmentManagementFee)}</div></td>
          <td><div class="scroll-cell">${escapeHtml(row.salesFee)}</div></td>
          <td><div class="scroll-cell">${escapeHtml(row.investmentRange)}</div></td>
          <td><div class="scroll-cell">${renderHistory(row)}</div></td>
          <td>${row.pdfUrl ? `<a href="${escapeHtml(row.pdfUrl)}" target="_blank" rel="noreferrer">PDF</a>` : "未找到"}</td>
        </tr>
      `).join("");
      mobileCards.innerHTML = visible.map(renderMobileCard).join("");
      tableWrap.style.display = visible.length ? "block" : "none";
      mobileCards.hidden = !visible.length;
      empty.style.display = visible.length ? "none" : "block";
      resultCount.textContent = `显示 ${visible.length} / ${PRODUCTS.length} 只产品`;
    }

    populateSelect(
      managerFilter,
      [...new Set(PRODUCTS.map(row => row.manager).filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-CN"))
    );
    populateSelect(
      riskFilter,
      [...new Set(PRODUCTS.map(row => row.risk).filter(Boolean))].sort((a, b) =>
        (Number(String(a).replace(/\D/g, "")) || 99) - (Number(String(b).replace(/\D/g, "")) || 99)
      )
    );

    document.querySelectorAll(".segments button").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".segments button").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        statusFilter = button.dataset.filter;
        render();
      });
    });
    search.addEventListener("input", render);
    [managerFilter, riskFilter, sortFilter].forEach(control => {
      control.addEventListener("change", render);
    });
    resetFilters.addEventListener("click", () => {
      search.value = "";
      managerFilter.value = "";
      riskFilter.value = "";
      sortFilter.value = "default";
      statusFilter = "all";
      document.querySelectorAll(".segments button").forEach(button => {
        button.classList.toggle("active", button.dataset.filter === "all");
      });
      render();
    });
    render();
  </script>
